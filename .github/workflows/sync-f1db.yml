name: Sync F1DB to D1

on:
  schedule:
    # 06:00 UTC daily — F1DB typically publishes within 24-48h of each race
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if already up to date'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check latest F1DB release
        id: f1db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/f1db/f1db/releases/latest \
            | jq -r '.tag_name')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest F1DB release: $LATEST"

      - name: Check last synced version
        id: local
        run: |
          if [ -f .f1db-version ]; then
            LAST=$(cat .f1db-version | tr -d '[:space:]')
          else
            LAST="none"
          fi
          echo "last=$LAST" >> $GITHUB_OUTPUT
          echo "Last synced: $LAST"

      - name: Compute driver stats from F1DB
        if: steps.f1db.outputs.latest != steps.local.outputs.last || github.event.inputs.force == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync:f1db

      - name: Generate D1 SQL dump
        if: steps.f1db.outputs.latest != steps.local.outputs.last || github.event.inputs.force == 'true'
        run: npm run dump:d1

      - name: Push to D1 production
        if: steps.f1db.outputs.latest != steps.local.outputs.last || github.event.inputs.force == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute f1versus-prod \
            --remote \
            --file=".cache/f1db/driver_stats.sql"

      - name: Update version file and commit
        if: steps.f1db.outputs.latest != steps.local.outputs.last || github.event.inputs.force == 'true'
        run: |
          echo "${{ steps.f1db.outputs.latest }}" > .f1db-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .f1db-version
          git commit -m "chore: sync F1DB ${{ steps.f1db.outputs.latest }}"
          git push

      - name: Already up to date
        if: steps.f1db.outputs.latest == steps.local.outputs.last && github.event.inputs.force != 'true'
        run: echo "Already at ${{ steps.f1db.outputs.latest }} — nothing to do."
