name = "f1-versus"
main = ".open-next/worker.js"
compatibility_date = "2026-03-30"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "f1-versus-db"
database_id = "5104b860-bfef-48e4-b929-c50addb66312"   # replace with real ID from: wrangler d1 create f1-versus-db

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "f1-versus"

[observability]
enabled = true

[vars]
NEXT_PUBLIC_SITE_URL = "https://f1-versus.com"
# Set secrets via: wrangler secret put GROQ_API_KEY
#                  wrangler secret put VOTE_IP_HASH_SECRET
GROQ_API_KEY = ""
